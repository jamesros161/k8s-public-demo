name: Site - Deploy

on:
  workflow_dispatch:
    inputs:
      site_id:
        description: Short site slug (DNS label), e.g. alpha — upper-case is normalized to lower-case for Helm/Kubernetes
        required: true
        type: string
      app_type:
        description: Application stack
        required: true
        type: choice
        options:
          - wordpress
          - drupal
      wordpress_site_title:
        description: WordPress site title (ignored for Drupal)
        required: false
        default: "Demo site"
        type: string
      wordpress_tagline:
        description: WordPress tagline / site description
        required: false
        default: ""
        type: string
      wordpress_admin_username:
        description: WordPress admin username
        required: false
        default: "admin"
        type: string
      wordpress_admin_email:
        description: WordPress admin email (ignored for Drupal; change default for real mail)
        required: false
        default: "wp-admin@example.invalid"
        type: string
      drupal_admin_username:
        description: Drupal admin username (ignored for WordPress; must match Helm drupal.adminUser)
        required: false
        default: "admin"
        type: string

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/validate-configuration.yml
    with:
      scenario: site-deploy
    secrets: inherit

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OS_AUTH_URL: ${{ vars.OS_AUTH_URL }}
      OS_REGION_NAME: ${{ vars.OS_REGION_NAME }}
      OS_INTERFACE: ${{ vars.OS_INTERFACE }}
      OS_IDENTITY_API_VERSION: ${{ vars.OS_IDENTITY_API_VERSION }}
      OS_AUTH_TYPE: ${{ vars.OS_AUTH_TYPE }}
      OS_APPLICATION_CREDENTIAL_ID: ${{ secrets.OS_APPLICATION_CREDENTIAL_ID }}
      OS_APPLICATION_CREDENTIAL_SECRET: ${{ secrets.OS_APPLICATION_CREDENTIAL_SECRET }}
      CLUSTER_NAME: ${{ vars.CLUSTER_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenStack CLI (Magnum)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "python-openstackclient" "python-magnumclient"
          echo "$(python -c 'import site; print(site.getuserbase())')/bin" >> "$GITHUB_PATH"

      - name: Resolve cluster name
        id: cluster
        run: |
          C="${CLUSTER_NAME}"
          if [ -z "$C" ]; then C="vpc-demo-cluster"; fi
          echo "name=$C" >> "$GITHUB_OUTPUT"

      - name: Fetch kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          openstack coe cluster config "${{ steps.cluster.outputs.name }}" --dir "$HOME/.kube"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Normalize site id (Helm/Kubernetes DNS label)
        id: site
        run: |
          set -euo pipefail
          SLUG=$(bash scripts/normalize-site-id.sh "${{ inputs.site_id }}")
          echo "slug=${SLUG}" >> "${GITHUB_OUTPUT}"
          if [ "${{ inputs.site_id }}" != "${SLUG}" ]; then
            echo "::notice::site_id normalized: '${{ inputs.site_id }}' → '${SLUG}' (Helm release names must be lowercase)."
          fi

      - name: Helm upgrade (site)
        env:
          SITE_ID: ${{ steps.site.outputs.slug }}
          APP_TYPE: ${{ inputs.app_type }}
          DOMAIN_BASE: ${{ vars.DEMO_DOMAIN_BASE }}
          DB_PASS: ${{ secrets.DEMO_DB_PASSWORD }}
          DB_ROOT: ${{ secrets.DEMO_DB_ROOT_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${DB_PASS}" ] || [ -z "${DB_ROOT}" ]; then
            echo "::error::DEMO_DB_PASSWORD and DEMO_DB_ROOT_PASSWORD must be set to non-empty values in repository Secrets."
            echo "If either secret is missing, Helm gets --set db.password= / db.rootPassword= and overrides chart defaults; MariaDB then exits with 'password option is not specified'."
            exit 1
          fi
          NS="${SITE_ID}-${APP_TYPE}"
          REL="$SITE_ID"
          DOMAIN="${DOMAIN_BASE:-k8sdemo.example.com}"
          rm -f "${RUNNER_TEMP}/drupal_site_admin_password" || true
          DRUPAL_HELM=()
          if [ "${APP_TYPE}" = "drupal" ]; then
            DP="$(openssl rand -base64 30 | tr -d '\n')"
            echo "::add-mask::${DP}"
            printf '%s' "${DP}" > "${RUNNER_TEMP}/drupal_site_admin_password"
            chmod 600 "${RUNNER_TEMP}/drupal_site_admin_password"
            DRUPAL_HELM=(
              --set-string "drupal.adminPassword=${DP}"
              --set-string "drupal.adminUser=${{ inputs.drupal_admin_username }}"
            )
          fi
          helm upgrade --install "$REL" ./helm/site-template \
            --namespace "$NS" \
            --create-namespace \
            --set "siteId=$SITE_ID" \
            --set "appType=$APP_TYPE" \
            --set "domainBase=$DOMAIN" \
            --set-string "db.password=${DB_PASS}" \
            --set-string "db.rootPassword=${DB_ROOT}" \
            "${DRUPAL_HELM[@]}"

      - name: WordPress — wait for DB and run WP-CLI install
        if: inputs.app_type == 'wordpress'
        env:
          DEPLOY_NAMESPACE: ${{ steps.site.outputs.slug }}-wordpress
          SITE_ID: ${{ steps.site.outputs.slug }}
          APP_TYPE: wordpress
          DOMAIN_BASE: ${{ vars.DEMO_DOMAIN_BASE }}
          WP_SITE_TITLE: ${{ inputs.wordpress_site_title }}
          WP_TAGLINE: ${{ inputs.wordpress_tagline }}
          WP_ADMIN_USER: ${{ inputs.wordpress_admin_username }}
          WP_ADMIN_EMAIL: ${{ inputs.wordpress_admin_email }}
          MARIADB_ROOT_PASSWORD: ${{ secrets.DEMO_DB_ROOT_PASSWORD }}
          DB_APP_PASSWORD: ${{ secrets.DEMO_DB_PASSWORD }}
        run: |
          set -euo pipefail
          export DOMAIN_BASE="${DOMAIN_BASE:-k8sdemo.example.com}"
          WP_ADMIN_PASSWORD="$(openssl rand -base64 30 | tr -d '\n')"
          echo "::add-mask::${WP_ADMIN_PASSWORD}"
          export WP_ADMIN_PASSWORD
          bash scripts/wordpress-wpcli-bootstrap.sh
          kubectl create secret generic wordpress-admin \
            --namespace="${DEPLOY_NAMESPACE}" \
            --from-literal=username="${WP_ADMIN_USER}" \
            --from-literal=password="${WP_ADMIN_PASSWORD}" \
            --from-literal=site-url="https://${SITE_ID}.wordpress.${DOMAIN_BASE}/" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "::notice::WordPress admin password is in Secret wordpress-admin (namespace ${DEPLOY_NAMESPACE}). Retrieve with kubectl — see README."

      - name: Drupal — sync admin password and store Secret
        if: inputs.app_type == 'drupal'
        env:
          DEPLOY_NAMESPACE: ${{ steps.site.outputs.slug }}-drupal
          SITE_ID: ${{ steps.site.outputs.slug }}
          APP_TYPE: drupal
          DOMAIN_BASE: ${{ vars.DEMO_DOMAIN_BASE }}
          DRUPAL_ADMIN_USER: ${{ inputs.drupal_admin_username }}
          MARIADB_ROOT_PASSWORD: ${{ secrets.DEMO_DB_ROOT_PASSWORD }}
          DB_APP_PASSWORD: ${{ secrets.DEMO_DB_PASSWORD }}
        run: |
          set -euo pipefail
          export DOMAIN_BASE="${DOMAIN_BASE:-k8sdemo.example.com}"
          PF="${RUNNER_TEMP}/drupal_site_admin_password"
          export DRUPAL_ADMIN_PASSWORD="$(cat "$PF")"
          echo "::add-mask::${DRUPAL_ADMIN_PASSWORD}"
          bash scripts/drupal-drush-bootstrap.sh
          kubectl create secret generic drupal-admin \
            --namespace="${DEPLOY_NAMESPACE}" \
            --from-literal=username="${DRUPAL_ADMIN_USER}" \
            --from-literal=password="${DRUPAL_ADMIN_PASSWORD}" \
            --from-literal=site-url="https://${SITE_ID}.drupal.${DOMAIN_BASE}/" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "::notice::Drupal admin password is in Secret drupal-admin (namespace ${DEPLOY_NAMESPACE}). Retrieve with kubectl — see README."

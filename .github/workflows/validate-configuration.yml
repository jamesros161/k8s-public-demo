name: 1 - Validate configuration

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: |
          What to validate. Use **provision** before Cluster Provision/Destroy (includes S3 state + Let's Encrypt).
          Use **site-deploy** before Site Deploy or Scaling workflows (includes DB secrets).
          Use **core** for kube-only workflows (Traefik toggle, Headlamp, burst destroy, etc.).
        type: choice
        options:
          - core
          - provision
          - site-deploy
        default: provision
      run_openstack_check:
        description: Attempt a real OpenStack token (recommended)
        type: boolean
        default: true
  workflow_call:
    inputs:
      scenario:
        required: true
        type: string
      run_openstack_check:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OS_AUTH_URL: ${{ vars.OS_AUTH_URL }}
      OS_REGION_NAME: ${{ vars.OS_REGION_NAME }}
      OS_INTERFACE: ${{ vars.OS_INTERFACE }}
      OS_IDENTITY_API_VERSION: ${{ vars.OS_IDENTITY_API_VERSION }}
      OS_AUTH_TYPE: ${{ vars.OS_AUTH_TYPE }}
      OS_APPLICATION_CREDENTIAL_ID: ${{ secrets.OS_APPLICATION_CREDENTIAL_ID }}
      OS_APPLICATION_CREDENTIAL_SECRET: ${{ secrets.OS_APPLICATION_CREDENTIAL_SECRET }}
      OS_PROJECT_ID: ${{ vars.OS_PROJECT_ID }}
      LETSENCRYPT_EMAIL: ${{ vars.LETSENCRYPT_EMAIL }}
      TF_STATE_S3_BUCKET: ${{ vars.TF_STATE_S3_BUCKET }}
      TF_STATE_S3_ENDPOINT: ${{ vars.TF_STATE_S3_ENDPOINT }}
      DEMO_DOMAIN_BASE: ${{ vars.DEMO_DOMAIN_BASE }}
      DEMO_DB_PASSWORD: ${{ secrets.DEMO_DB_PASSWORD }}
      DEMO_DB_ROOT_PASSWORD: ${{ secrets.DEMO_DB_ROOT_PASSWORD }}
      VALIDATE_SCENARIO: ${{ inputs.scenario }}
      RUN_OPENSTACK_CHECK: ${{ inputs.run_openstack_check }}
      TERRAFORM_OPENSTACK_USERNAME: ${{ secrets.TERRAFORM_OPENSTACK_USERNAME }}
      TERRAFORM_OPENSTACK_PASSWORD: ${{ secrets.TERRAFORM_OPENSTACK_PASSWORD }}
      TERRAFORM_OPENSTACK_PROJECT_ID: ${{ vars.TERRAFORM_OPENSTACK_PROJECT_ID }}
      EXISTING_ROUTER_ID: ${{ vars.EXISTING_ROUTER_ID }}
      EXISTING_NETWORK_ID: ${{ vars.EXISTING_NETWORK_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select OpenStack auth (app credential or password for Magnum trust)
        run: bash scripts/configure-gha-openstack-auth.sh
        env:
          TERRAFORM_OPENSTACK_USERNAME: ${{ secrets.TERRAFORM_OPENSTACK_USERNAME }}
          TERRAFORM_OPENSTACK_PASSWORD: ${{ secrets.TERRAFORM_OPENSTACK_PASSWORD }}
          TERRAFORM_OPENSTACK_PROJECT_ID: ${{ vars.TERRAFORM_OPENSTACK_PROJECT_ID }}
          TERRAFORM_OPENSTACK_USER_DOMAIN_NAME: ${{ vars.TERRAFORM_OPENSTACK_USER_DOMAIN_NAME }}
          TERRAFORM_OPENSTACK_PROJECT_DOMAIN_ID: ${{ vars.TERRAFORM_OPENSTACK_PROJECT_DOMAIN_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenStack CLI (Magnum)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "python-openstackclient" "python-magnumclient"
          echo "$(python -c 'import site; print(site.getuserbase())')/bin" >> "$GITHUB_PATH"

      - name: Run validation script
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_S3_SECRET_ACCESS_KEY }}
        run: bash scripts/validate-github-actions-config.sh

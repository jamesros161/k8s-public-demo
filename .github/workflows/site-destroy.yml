name: 4 - Destroy Single Site

# Deletes one Site - Deploy stack (namespace {site_id}-wordpress|drupal). Irreversible (PVCs removed).

on:
  workflow_dispatch:
    inputs:
      site_id:
        description: Same value as **Site - Deploy → subdomain** (e.g. demo, blog)
        required: true
        type: string
      app_type:
        description: Application stack (must match what was deployed)
        required: true
        type: choice
        options:
          - wordpress
          - drupal
      dry_run:
        description: List the target namespace only; do not delete
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/validate-configuration.yml
    with:
      scenario: core
    secrets: inherit

  destroy:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OS_AUTH_URL: ${{ vars.OS_AUTH_URL }}
      OS_REGION_NAME: ${{ vars.OS_REGION_NAME }}
      OS_INTERFACE: ${{ vars.OS_INTERFACE }}
      OS_IDENTITY_API_VERSION: ${{ vars.OS_IDENTITY_API_VERSION }}
      OS_AUTH_TYPE: ${{ vars.OS_AUTH_TYPE }}
      OS_APPLICATION_CREDENTIAL_ID: ${{ secrets.OS_APPLICATION_CREDENTIAL_ID }}
      OS_APPLICATION_CREDENTIAL_SECRET: ${{ secrets.OS_APPLICATION_CREDENTIAL_SECRET }}
      CLUSTER_NAME: ${{ vars.CLUSTER_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenStack CLI (Magnum)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "python-openstackclient" "python-magnumclient"
          echo "$(python -c 'import site; print(site.getuserbase())')/bin" >> "$GITHUB_PATH"

      - name: Resolve cluster name
        id: cluster
        run: |
          C="${CLUSTER_NAME}"
          if [ -z "$C" ]; then C="vpc-demo-cluster"; fi
          echo "name=$C" >> "$GITHUB_OUTPUT"

      - name: Fetch kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          openstack coe cluster config "${{ steps.cluster.outputs.name }}" --dir "$HOME/.kube"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Destroy customer site namespace
        env:
          SITE_ID: ${{ inputs.site_id }}
          APP_TYPE: ${{ inputs.app_type }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: |
          set -euo pipefail
          bash scripts/destroy-customer-site.sh

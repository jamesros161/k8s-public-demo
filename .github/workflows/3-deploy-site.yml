name: 03 - Deploy Single Site

on:
  workflow_dispatch:
    inputs:
      subdomain:
        description: |
          Site subdomain — the first segment of the hostname (e.g. blog → blog.wordpress.your-domain / blog.drupal.your-domain).
          Use lowercase letters, numbers, and hyphens only (DNS label). Leave default for a site named "demo".
        required: false
        default: "demo"
        type: string
      app_type:
        description: Application stack
        required: true
        type: choice
        options:
          - wordpress
          - drupal
      admin_username:
        description: Admin username (WordPress and Drupal)
        required: false
        default: "admin"
        type: string
      admin_password:
        description: Admin password (demo-oriented; change in the app later — do not use a production password)
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUD_ADMIN_CONFIG_B64: ${{ secrets.CLOUD_ADMIN_CONFIG_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load cloud-admin config bundle
        run: bash scripts/load-cloud-admin-config.sh

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Load kubeconfig from encrypted artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/load-kubeconfig-from-artifact.sh

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Normalize subdomain (Helm release / DNS label)
        id: site
        run: |
          set -euo pipefail
          RAW="${{ inputs.subdomain }}"
          if [ -z "${RAW// }" ]; then RAW="demo"; fi
          SLUG=$(bash scripts/normalize-site-id.sh "${RAW}")
          echo "slug=${SLUG}" >> "${GITHUB_OUTPUT}"
          if [ "${RAW}" != "${SLUG}" ]; then
            echo "::notice::subdomain normalized for Kubernetes/DNS: '${RAW}' → '${SLUG}'"
          fi

      - name: Helm upgrade (site)
        env:
          SITE_ID: ${{ steps.site.outputs.slug }}
          APP_TYPE: ${{ inputs.app_type }}
          ADMIN_USER: ${{ inputs.admin_username != '' && inputs.admin_username || 'admin' }}
          ADMIN_PASSWORD: ${{ inputs.admin_password }}
        run: |
          set -euo pipefail
          echo "::add-mask::${ADMIN_PASSWORD}"
          if [ -z "${DEMO_DB_PASSWORD:-}" ] || [ -z "${DEMO_DB_ROOT_PASSWORD:-}" ]; then
            echo "::error::DEMO_DB_PASSWORD and DEMO_DB_ROOT_PASSWORD must be set to non-empty values in CLOUD_ADMIN_CONFIG_B64."
            echo "If either secret is missing, Helm gets --set db.password= / db.rootPassword= and overrides chart defaults; MariaDB then exits with 'password option is not specified'."
            exit 1
          fi
          NS="${SITE_ID}-${APP_TYPE}"
          REL="$SITE_ID"
          DOMAIN="${DEMO_DOMAIN_BASE:-k8sdemo.example.com}"
          DRUPAL_HELM=()
          if [ "${APP_TYPE}" = "drupal" ]; then
            DRUPAL_HELM=(
              --set-string "drupal.adminPassword=${ADMIN_PASSWORD}"
              --set-string "drupal.adminUser=${ADMIN_USER}"
            )
          fi
          helm upgrade --install "$REL" ./helm/site-template \
            --namespace "$NS" \
            --create-namespace \
            --set "siteId=$SITE_ID" \
            --set "appType=$APP_TYPE" \
            --set "domainBase=$DOMAIN" \
            --set-string "db.password=${DEMO_DB_PASSWORD}" \
            --set-string "db.rootPassword=${DEMO_DB_ROOT_PASSWORD}" \
            "${DRUPAL_HELM[@]}"

      - name: WordPress — wait for DB and run WP-CLI install
        if: inputs.app_type == 'wordpress'
        env:
          DEPLOY_NAMESPACE: ${{ steps.site.outputs.slug }}-wordpress
          SITE_ID: ${{ steps.site.outputs.slug }}
          APP_TYPE: wordpress
          WP_ADMIN_USER: ${{ inputs.admin_username != '' && inputs.admin_username || 'admin' }}
          WP_ADMIN_PASSWORD: ${{ inputs.admin_password }}
        run: |
          set -euo pipefail
          echo "::add-mask::${WP_ADMIN_PASSWORD}"
          export DOMAIN_BASE="${DEMO_DOMAIN_BASE:-k8sdemo.example.com}"
          export MARIADB_ROOT_PASSWORD="${DEMO_DB_ROOT_PASSWORD:-}"
          export DB_APP_PASSWORD="${DEMO_DB_PASSWORD:-}"
          bash scripts/wordpress-wpcli-bootstrap.sh
          kubectl create secret generic wordpress-admin \
            --namespace="${DEPLOY_NAMESPACE}" \
            --from-literal=username="${WP_ADMIN_USER}" \
            --from-literal=password="${WP_ADMIN_PASSWORD}" \
            --from-literal=site-url="https://${SITE_ID}.wordpress.${DOMAIN_BASE}/" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "::notice::WordPress URL: https://${SITE_ID}.wordpress.${DOMAIN_BASE}/ — admin credentials are also in Secret wordpress-admin (namespace ${DEPLOY_NAMESPACE})."

      - name: Drupal — sync admin password and store Secret
        if: inputs.app_type == 'drupal'
        env:
          DEPLOY_NAMESPACE: ${{ steps.site.outputs.slug }}-drupal
          SITE_ID: ${{ steps.site.outputs.slug }}
          APP_TYPE: drupal
          DRUPAL_ADMIN_USER: ${{ inputs.admin_username != '' && inputs.admin_username || 'admin' }}
          DRUPAL_ADMIN_PASSWORD: ${{ inputs.admin_password }}
        run: |
          set -euo pipefail
          echo "::add-mask::${DRUPAL_ADMIN_PASSWORD}"
          export DOMAIN_BASE="${DEMO_DOMAIN_BASE:-k8sdemo.example.com}"
          export MARIADB_ROOT_PASSWORD="${DEMO_DB_ROOT_PASSWORD:-}"
          export DB_APP_PASSWORD="${DEMO_DB_PASSWORD:-}"
          bash scripts/drupal-drush-bootstrap.sh
          kubectl create secret generic drupal-admin \
            --namespace="${DEPLOY_NAMESPACE}" \
            --from-literal=username="${DRUPAL_ADMIN_USER}" \
            --from-literal=password="${DRUPAL_ADMIN_PASSWORD}" \
            --from-literal=site-url="https://${SITE_ID}.drupal.${DOMAIN_BASE}/" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "::notice::Drupal URL: https://${SITE_ID}.drupal.${DOMAIN_BASE}/ — admin credentials are also in Secret drupal-admin (namespace ${DEPLOY_NAMESPACE})."

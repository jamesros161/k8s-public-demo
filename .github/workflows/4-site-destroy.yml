name: 04 - Destroy Single Site

# Deletes one Site - Deploy stack (namespace {site_id}-wordpress|drupal). Irreversible (PVCs removed).

on:
  workflow_dispatch:
    inputs:
      site_id:
        description: Same value as **Site - Deploy → subdomain** (e.g. demo, blog)
        required: true
        type: string
      app_type:
        description: Application stack (must match what was deployed)
        required: true
        type: choice
        options:
          - wordpress
          - drupal
      dry_run:
        description: List the target namespace only; do not delete
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUD_ADMIN_CONFIG_B64: ${{ secrets.CLOUD_ADMIN_CONFIG_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load cloud-admin config bundle
        run: bash scripts/load-cloud-admin-config.sh

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Load kubeconfig from encrypted artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/load-kubeconfig-from-artifact.sh

      - name: Destroy customer site namespace
        env:
          SITE_ID: ${{ inputs.site_id }}
          APP_TYPE: ${{ inputs.app_type }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: |
          set -euo pipefail
          bash scripts/destroy-customer-site.sh

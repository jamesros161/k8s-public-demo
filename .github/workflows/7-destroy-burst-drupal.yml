name: 07 - Scale down Cluster

# Deletes site namespaces created by "Scaling - Burst Up"
# (pattern scale-<run_id>-<nnn>-drupal). Removes workloads so the cluster autoscaler
# can scale worker nodes down after its idle delay.

on:
  workflow_dispatch:
    inputs:
      github_run_id:
        description: "Optional: limit to one burst (GitHub run_id from the install workflow). Leave empty to delete all matching burst namespaces."
        required: false
        default: ""
        type: string
      dry_run:
        description: List matching namespaces only; do not delete
        required: false
        default: false
        type: boolean
      scale_down_wait_minutes:
        description: Max minutes to watch node scale-down after deleting burst namespaces
        required: false
        default: "30"
        type: string

permissions:
  contents: read
  actions: read

jobs:
  destroy-burst:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUD_ADMIN_CONFIG_B64: ${{ secrets.CLOUD_ADMIN_CONFIG_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load cloud-admin config bundle
        run: bash scripts/load-cloud-admin-config.sh

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Load kubeconfig from encrypted artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/load-kubeconfig-from-artifact.sh

      - name: Capture pre-delete node count
        if: ${{ !inputs.dry_run }}
        run: |
          echo "SCALE_DOWN_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          echo "PRE_DELETE_NODE_COUNT=$(kubectl get nodes --no-headers 2>/dev/null | wc -l | tr -d ' ')" >> "$GITHUB_ENV"

      - name: Destroy burst namespaces
        env:
          RUN_ID_FILTER: ${{ inputs.github_run_id }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: |
          set -euo pipefail
          bash scripts/destroy-burst-drupal-sites.sh

      - name: Remaining burst-shaped namespaces
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          kubectl get ns -o name 2>/dev/null | sed 's|namespace/||' | grep -E '^scale-[0-9]+-[0-9]+-drupal$' || echo "(none left matching burst pattern)"

      - name: Autoscaler scale-down diagnostics
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          echo "::notice::Extra workers usually disappear only after scale-down delays (often ~10m each unless you ran tune-cluster-autoscaler-demo). They will not drop below your node group minimum size. Nodes still hosting Traefik, other apps, or certain kube-system pods may not be chosen for removal — see diagnostics below."
          bash scripts/diagnose-cluster-autoscaler-scale-down.sh

      - name: Watch node scale-down KPIs
        if: ${{ !inputs.dry_run }}
        env:
          SCALE_DOWN_WAIT_MINUTES: ${{ inputs.scale_down_wait_minutes }}
        run: |
          set -euo pipefail
          if ! [[ "${SCALE_DOWN_WAIT_MINUTES}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::scale_down_wait_minutes must be a positive integer."
            exit 1
          fi

          PRE="${PRE_DELETE_NODE_COUNT:-0}"
          START="${SCALE_DOWN_START_EPOCH:-$(date +%s)}"
          DEADLINE=$((START + SCALE_DOWN_WAIT_MINUTES * 60))
          LOWEST="$PRE"

          while true; do
            NOW=$(date +%s)
            CUR=$(kubectl get nodes --no-headers 2>/dev/null | wc -l | tr -d ' ')
            if (( CUR < LOWEST )); then
              LOWEST="$CUR"
            fi
            echo "scale-down watch: current_nodes=${CUR} lowest_nodes=${LOWEST} pre_delete_nodes=${PRE}"
            if (( NOW >= DEADLINE )); then
              break
            fi
            sleep 60
          done

          END=$(date +%s)
          DURATION=$((END - START))
          NODE_DROP=$((PRE - LOWEST))
          {
            echo "time_to_scale_down_observe_seconds=${DURATION}"
            echo "pre_delete_node_count=${PRE}"
            echo "lowest_node_count_observed=${LOWEST}"
            echo "node_drop_observed=${NODE_DROP}"
          } > scale-down-kpis.txt

          echo "::notice::KPI time_to_scale_down_observe_seconds=${DURATION} pre_delete_nodes=${PRE} lowest_nodes=${LOWEST} node_drop_observed=${NODE_DROP}"

      - name: Upload scale-down KPI snapshot
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: scale-down-kpi-snapshot-${{ github.run_id }}
          path: scale-down-kpis.txt
          if-no-files-found: warn

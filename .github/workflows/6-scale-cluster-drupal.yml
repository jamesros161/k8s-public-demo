name: 06 - Scale up Cluster

# Installs many Drupal stacks via Helm only (no Drush wait, no drupal-admin Secret).
# Each site’s app pod requests 512Mi (see helm/site-template/values.yaml); MariaDB pods
# have no requests in the chart. Default site_count is sized so app requests exceed
# ~8 GiB across two 4GB nodes, which tends to leave Pods pending and trigger node autoscaling.

on:
  workflow_dispatch:
    inputs:
      site_count:
        description: Number of Drupal sites (Helm releases) to install
        required: false
        default: "24"
        type: string
      helm_parallel:
        description: Concurrent helm upgrade --install processes
        required: false
        default: "10"
        type: string
      wait_timeout_minutes:
        description: Max time to wait after Helm for nodes + burst sites (MariaDB + Drupal Available)
        required: false
        default: "40"
        type: string
      poll_interval_seconds:
        description: Seconds between status log groups while waiting
        required: false
        default: "15"
        type: string

permissions:
  contents: read
  actions: read

jobs:
  burst:
    runs-on: ubuntu-latest
    # Helm burst + wait for scale-up and all Drupal/MariaDB rollouts
    timeout-minutes: 75
    env:
      CLOUD_ADMIN_CONFIG_B64: ${{ secrets.CLOUD_ADMIN_CONFIG_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load cloud-admin config bundle
        run: bash scripts/load-cloud-admin-config.sh

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Load kubeconfig from encrypted artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/load-kubeconfig-from-artifact.sh

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Capture burst baseline
        run: |
          set -euo pipefail
          echo "BURST_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          echo "BURST_INITIAL_NODE_COUNT=$(kubectl get nodes --no-headers 2>/dev/null | wc -l | tr -d ' ')" >> "$GITHUB_ENV"

      - name: Parallel Drupal Helm installs (no Drush)
        env:
          SITE_COUNT: ${{ inputs.site_count }}
          HELM_PARALLEL: ${{ inputs.helm_parallel }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${DEMO_DB_PASSWORD:-}" ] || [ -z "${DEMO_DB_ROOT_PASSWORD:-}" ]; then
            echo "::error::DEMO_DB_PASSWORD and DEMO_DB_ROOT_PASSWORD must be set (same as Site - Deploy)."
            exit 1
          fi
          DP="$(openssl rand -base64 24 | tr -d '\n')"
          echo "::add-mask::${DP}"
          export DRUPAL_ADMIN_PASSWORD="${DP}"
          export DOMAIN_BASE="${DEMO_DOMAIN_BASE:-k8sdemo.example.com}"
          export DB_PASS="${DEMO_DB_PASSWORD}"
          export DB_ROOT="${DEMO_DB_ROOT_PASSWORD}"
          bash scripts/scale-deploy-drupal-sites.sh

      - name: Wait for autoscaling and burst sites ready
        env:
          RUN_ID: ${{ github.run_id }}
          EXPECTED_SITE_COUNT: ${{ inputs.site_count }}
          WAIT_TIMEOUT_MINUTES: ${{ inputs.wait_timeout_minutes }}
          POLL_SECONDS: ${{ inputs.poll_interval_seconds }}
          BURST_START_EPOCH: ${{ env.BURST_START_EPOCH }}
          BURST_INITIAL_NODE_COUNT: ${{ env.BURST_INITIAL_NODE_COUNT }}
          METRICS_OUTPUT_FILE: burst-kpis.txt
        run: |
          set -euo pipefail
          if ! [[ "${WAIT_TIMEOUT_MINUTES}" =~ ^[1-9][0-9]*$ ]] || ! [[ "${POLL_SECONDS}" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::wait_timeout_minutes and poll_interval_seconds must be positive integers."
            exit 1
          fi
          export MAX_WAIT_SECONDS=$((WAIT_TIMEOUT_MINUTES * 60))
          echo "::notice::Polling nodes, Pending burst pods, and MariaDB/Drupal readiness until all match or timeout (${MAX_WAIT_SECONDS}s max)."
          bash scripts/wait-burst-drupal-ready.sh

      - name: Upload burst KPI snapshot
        uses: actions/upload-artifact@v4
        with:
          name: burst-kpi-snapshot-${{ github.run_id }}
          path: burst-kpis.txt
          if-no-files-found: warn

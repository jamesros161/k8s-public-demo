name: 10 - Destroy All Sites

# Deletes every *-wordpress / *-drupal namespace from Site - Deploy. Does not remove Scaling - Burst Up
# namespaces (scale-<run_id>-<nnn>-drupal). Irreversible.

on:
  workflow_dispatch:
    inputs:
      destroy_confirmation:
        description: |
          Irreversible: deletes all customer site namespaces (*-wordpress / *-drupal) except burst demos.
          Ignored when dry_run is true. To proceed, choose delete-all-customer-sites-confirm.
        required: true
        type: choice
        default: cancel
        options:
          - cancel
          - delete-all-customer-sites-confirm
      dry_run:
        description: List matching namespaces only; do not delete (no confirmation required)
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

jobs:
  destroy-all:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUD_ADMIN_CONFIG_B64: ${{ secrets.CLOUD_ADMIN_CONFIG_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load cloud-admin config bundle
        run: bash scripts/load-cloud-admin-config.sh

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Load kubeconfig from encrypted artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/load-kubeconfig-from-artifact.sh

      - name: Require explicit confirmation
        if: ${{ !inputs.dry_run }}
        run: |
          if [ "${{ inputs.destroy_confirmation }}" != "delete-all-customer-sites-confirm" ]; then
            echo "::notice::Cancelled — leave confirmation on **cancel** to abort, or enable **dry_run** to list namespaces only."
            exit 1
          fi
          echo "Confirmation accepted; deleting all matched customer site namespaces."

      - name: Destroy all customer site namespaces
        env:
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: |
          set -euo pipefail
          bash scripts/destroy-all-customer-sites.sh

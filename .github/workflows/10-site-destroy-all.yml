name: 10 - Destroy All Sites

# Deletes every *-wordpress / *-drupal namespace from Site - Deploy. Does not remove Scaling - Burst Up
# namespaces (scale-<run_id>-<nnn>-drupal). Irreversible.

on:
  workflow_dispatch:
    inputs:
      destroy_confirmation:
        description: |
          Irreversible: deletes all customer site namespaces (*-wordpress / *-drupal) except burst demos.
          Ignored when dry_run is true. To proceed, choose delete-all-customer-sites-confirm.
        required: true
        type: choice
        default: cancel
        options:
          - cancel
          - delete-all-customer-sites-confirm
      dry_run:
        description: List matching namespaces only; do not delete (no confirmation required)
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/validate-configuration.yml
    with:
      scenario: core
    secrets: inherit

  destroy-all:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OS_AUTH_URL: ${{ vars.OS_AUTH_URL }}
      OS_REGION_NAME: ${{ vars.OS_REGION_NAME }}
      OS_INTERFACE: ${{ vars.OS_INTERFACE }}
      OS_IDENTITY_API_VERSION: ${{ vars.OS_IDENTITY_API_VERSION }}
      OS_AUTH_TYPE: ${{ vars.OS_AUTH_TYPE }}
      OS_APPLICATION_CREDENTIAL_ID: ${{ secrets.OS_APPLICATION_CREDENTIAL_ID }}
      OS_APPLICATION_CREDENTIAL_SECRET: ${{ secrets.OS_APPLICATION_CREDENTIAL_SECRET }}
      CLUSTER_NAME: ${{ vars.CLUSTER_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenStack CLI (Magnum)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "python-openstackclient" "python-magnumclient"
          echo "$(python -c 'import site; print(site.getuserbase())')/bin" >> "$GITHUB_PATH"

      - name: Resolve cluster name
        id: cluster
        run: |
          C="${CLUSTER_NAME}"
          if [ -z "$C" ]; then C="vpc-demo-cluster"; fi
          echo "name=$C" >> "$GITHUB_OUTPUT"

      - name: Fetch kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          openstack coe cluster config "${{ steps.cluster.outputs.name }}" --dir "$HOME/.kube"
          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Require explicit confirmation
        if: ${{ !inputs.dry_run }}
        run: |
          if [ "${{ inputs.destroy_confirmation }}" != "delete-all-customer-sites-confirm" ]; then
            echo "::notice::Cancelled — leave confirmation on **cancel** to abort, or enable **dry_run** to list namespaces only."
            exit 1
          fi
          echo "Confirmation accepted; deleting all matched customer site namespaces."

      - name: Destroy all customer site namespaces
        env:
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: |
          set -euo pipefail
          bash scripts/destroy-all-customer-sites.sh

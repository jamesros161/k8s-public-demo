name: 02 - Provision Cluster

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: openstack-terraform-provision
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CLOUD_ADMIN_CONFIG_B64: ${{ secrets.CLOUD_ADMIN_CONFIG_B64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load cloud-admin config bundle
        run: bash scripts/load-cloud-admin-config.sh

      - name: Select OpenStack auth (app credential)
        run: bash scripts/configure-gha-openstack-auth.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenStack CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install "python-openstackclient"
          echo "$(python -c 'import site; print(site.getuserbase())')/bin" >> "$GITHUB_PATH"

      - name: Map bundle vars to Terraform TF_VAR_* inputs
        run: |
          set -euo pipefail
          if [ -z "${K8S_IMAGE_NAME:-}" ] || [ -z "${K8S_FLAVOR_NAME:-}" ]; then
            echo "::error::K8S_IMAGE_NAME and K8S_FLAVOR_NAME must be set in CLOUD_ADMIN_CONFIG_B64."
            exit 1
          fi
          echo "TF_VAR_k8s_image_name=${K8S_IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "TF_VAR_k8s_flavor_name=${K8S_FLAVOR_NAME}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write Terraform S3 backend config (Swift)
        run: bash scripts/write-terraform-s3-backend-ci.sh

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config=backend.auto.hcl

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Fetch kubeconfig from control-plane console log
        working-directory: terraform
        run: |
          set -euo pipefail
          CP_FIP="$(terraform output -raw control_plane_floating_ip)"
          CP_SERVER_ID="$(terraform output -raw control_plane_server_id)"
          if [ -z "${CP_FIP}" ]; then
            echo "::error::control_plane_floating_ip output is empty. Check Terraform cluster resources."
            exit 1
          fi
          if [ -z "${CP_SERVER_ID}" ]; then
            echo "::error::control_plane_server_id output is empty. Check Terraform cluster resources."
            exit 1
          fi

          KCFG_B64=""
          for i in $(seq 1 120); do
            openstack console log show "${CP_SERVER_ID}" --lines 2000 > "$RUNNER_TEMP/control-plane-console.log" || true
            KCFG_B64="$(
              sed -n 's/.*K8S_ADMIN_KUBECONFIG_B64=\([A-Za-z0-9+/=]\+\).*/\1/p' "$RUNNER_TEMP/control-plane-console.log" \
                | tail -n1
            )"
            if [ -n "${KCFG_B64}" ]; then
              echo "kubeconfig payload found in console log."
              break
            fi
            echo "[$i/120] waiting for kubeconfig payload in control-plane console log..."
            sleep 15
          done

          if [ -z "${KCFG_B64}" ]; then
            echo "::error::Could not find kubeconfig payload in control-plane console output."
            exit 1
          fi

          echo "${KCFG_B64}" | base64 -d > "$RUNNER_TEMP/kubeconfig"

          sed -E "s#server: https://.*:6443#server: https://${CP_FIP}:6443#" "$RUNNER_TEMP/kubeconfig" > "$RUNNER_TEMP/kubeconfig.public"
          mv "$RUNNER_TEMP/kubeconfig.public" "$RUNNER_TEMP/kubeconfig"

          KCFG_B64="$(base64 -w0 "$RUNNER_TEMP/kubeconfig")"
          echo "KUBECONFIG_B64=${KCFG_B64}" >> "$GITHUB_ENV"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Load kubeconfig
        run: bash scripts/load-kubeconfig-from-secret.sh

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      # OpenStack CCM refuses LoadBalancer Services until at least one node is Ready and eligible
      # (workers; control-plane nodes are often excluded). Without this, Traefik EXTERNAL-IP stays pending for hours.
      - name: Wait for Kubernetes nodes Ready
        run: |
          set -euo pipefail
          kubectl get nodes -o wide || true
          echo "Waiting for nodes Ready (required before LoadBalancer can be created)..."
          kubectl wait --for=condition=Ready nodes --all --timeout=45m
          kubectl get nodes -o wide

      - name: Install OpenStack CCM (Octavia integration)
        run: bash scripts/install-openstack-ccm.sh

      - name: Install Cinder CSI driver + StorageClass
        run: bash scripts/install-cinder-csi.sh

      - name: Export derived autoscaler settings from Terraform outputs
        working-directory: terraform
        run: |
          set -euo pipefail
          echo "AS_CLUSTER_NAME=$(terraform output -raw autoscaler_cluster_name)" >> "$GITHUB_ENV"
          echo "AS_GROUP_NAME=$(terraform output -raw autoscaler_group_name)" >> "$GITHUB_ENV"
          echo "AS_NODES_MIN_SIZE=$(terraform output -raw autoscaler_nodes_min_size)" >> "$GITHUB_ENV"
          echo "AS_NODES_MAX_SIZE=$(terraform output -raw autoscaler_nodes_max_size)" >> "$GITHUB_ENV"

      - name: Install autoscaling stack
        run: bash scripts/install-autoscaling-stack.sh

      - name: Install Traefik
        run: |
          set -euo pipefail
          ST="${TRAEFIK_SERVICE_TYPE:-LoadBalancer}"
          if [ -z "$ST" ]; then ST=LoadBalancer; fi
          echo "Traefik service type: $ST"
          EMAIL="${LETSENCRYPT_EMAIL:-}"
          if [ -z "${EMAIL}" ]; then
            echo "::error::Set LETSENCRYPT_EMAIL in CLOUD_ADMIN_CONFIG_B64."
            exit 1
          fi
          helm repo add traefik https://traefik.github.io/charts
          helm repo update
          # Always set caServer: Helm upgrades otherwise keep a previous staging URL if you once set LETSENCRYPT_USE_STAGING=true.
          HELM_EXTRA=()
          if [ "${LETSENCRYPT_USE_STAGING:-}" = "true" ]; then
            echo "Using Let's Encrypt STAGING CA (certs will not be trusted by browsers)."
            HELM_EXTRA+=(--set-string "certificatesResolvers.letsencrypt.acme.caServer=https://acme-staging-v02.api.letsencrypt.org/directory")
          else
            HELM_EXTRA+=(--set-string "certificatesResolvers.letsencrypt.acme.caServer=https://acme-v02.api.letsencrypt.org/directory")
          fi
          helm upgrade --install traefik traefik/traefik \
            --namespace traefik \
            --create-namespace \
            --set "service.type=${ST}" \
            -f helm/traefik-values.yaml \
            --set-string "certificatesResolvers.letsencrypt.acme.email=${EMAIL}" \
            "${HELM_EXTRA[@]}" \
            --wait \
            --timeout 30m

      - name: Show Traefik service (get LB VIP or NodePorts)
        run: |
          kubectl get svc -n traefik traefik -o wide
          ST="${TRAEFIK_SERVICE_TYPE:-LoadBalancer}"
          if [ -z "$ST" ]; then ST=LoadBalancer; fi
          if [ "$ST" != "LoadBalancer" ]; then
            echo "::notice::Traefik uses ${ST}. For NodePort, reach the app via any node IP and the HTTP/HTTPS node ports above (wildcard DNS does not apply unless you front it with another LB)."
          fi

      - name: Encrypt kubeconfig for artifact
        run: |
          set -euo pipefail
          if [ -z "${KUBECONFIG_ARTIFACT_PASSPHRASE:-}" ]; then
            echo "::error::Set KUBECONFIG_ARTIFACT_PASSPHRASE in CLOUD_ADMIN_CONFIG_B64."
            exit 1
          fi
          echo "${KUBECONFIG_B64}" | base64 -d > "$RUNNER_TEMP/kubeconfig"
          printf '%s' "${KUBECONFIG_ARTIFACT_PASSPHRASE}" | gpg --batch --yes --passphrase-fd 0 --symmetric --cipher-algo AES256 -o "$RUNNER_TEMP/kubeconfig.gpg" "$RUNNER_TEMP/kubeconfig"

      - name: Upload Terraform state snapshot
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-snapshot
          path: |
            terraform/terraform.tfstate
            terraform/.terraform.lock.hcl
          if-no-files-found: warn

      - name: Upload encrypted kubeconfig artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig-encrypted-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/kubeconfig.gpg
          if-no-files-found: error

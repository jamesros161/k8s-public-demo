name: 01 - Validate configuration

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: |
          What to validate. Use **provision** before Cluster Provision/Destroy (includes S3 state + Let's Encrypt).
          Use **site-deploy** before Site Deploy or Scaling workflows (includes DB secrets).
          Use **core** for kube-only workflows (Traefik toggle, Headlamp, burst destroy, etc.).
        type: choice
        options:
          - core
          - provision
          - site-deploy
        default: provision
      run_openstack_check:
        description: For provision scenario only, attempt a real OpenStack token
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUD_ADMIN_CONFIG_B64: ${{ secrets.CLOUD_ADMIN_CONFIG_B64 }}
      VALIDATE_SCENARIO: ${{ inputs.scenario }}
      RUN_OPENSTACK_CHECK: ${{ inputs.run_openstack_check }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load cloud-admin config bundle
        run: bash scripts/load-cloud-admin-config.sh

      - name: Select OpenStack auth (app credential)
        run: bash scripts/configure-gha-openstack-auth.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenStack CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install "python-openstackclient"
          echo "$(python -c 'import site; print(site.getuserbase())')/bin" >> "$GITHUB_PATH"

      - name: Run validation script
        run: bash scripts/validate-github-actions-config.sh

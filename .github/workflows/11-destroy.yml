name: 11 - Destroy Full Cluster

on:
  workflow_dispatch:
    inputs:
      destroy_confirmation:
        description: |
          Irreversible: removes Terraform-managed OpenStack resources (networking, etc.).
          Default cancels. To proceed, change this to destroy-infra-confirm.
        required: true
        type: choice
        default: cancel
        options:
          - cancel
          - destroy-infra-confirm

permissions:
  contents: read
  actions: write

concurrency:
  group: openstack-terraform-provision
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CLOUD_ADMIN_CONFIG_B64: ${{ secrets.CLOUD_ADMIN_CONFIG_B64 }}

    steps:
      - name: Require explicit destroy confirmation
        run: |
          if [ "${{ inputs.destroy_confirmation }}" != "destroy-infra-confirm" ]; then
            echo "::notice::Destroy cancelled — confirmation left at default **cancel** (no cloud resources were changed)."
            exit 1
          fi
          echo "Destroy confirmation accepted; continuing."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Load cloud-admin config bundle
        run: bash scripts/load-cloud-admin-config.sh

      - name: Select OpenStack auth (app credential)
        run: bash scripts/configure-gha-openstack-auth.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenStack CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install "python-openstackclient"
          echo "$(python -c 'import site; print(site.getuserbase())')/bin" >> "$GITHUB_PATH"

      - name: Terraform state note
        run: |
          echo "::notice::Without remote state or a downloaded terraform.tfstate from the provision artifact, destroy may not remove cloud resources."

      - name: Setup kubectl and Helm (optional cleanup)
        uses: azure/setup-kubectl@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Load kubeconfig from encrypted artifact
        env:
          GH_TOKEN: ${{ github.token }}
          LOAD_KUBECONFIG_ARTIFACT_OPTIONAL: "true"
        run: bash scripts/load-kubeconfig-from-artifact.sh

      - name: Try remove Traefik (ignore errors)
        continue-on-error: true
        run: |
          helm uninstall traefik -n traefik || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write Terraform S3 backend config (Swift)
        run: bash scripts/write-terraform-s3-backend-ci.sh

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config=backend.auto.hcl

      - name: Try delete CAPO workload cluster first (ignore errors)
        continue-on-error: true
        working-directory: terraform
        run: |
          set -euo pipefail
          CP_SERVER_ID="$(terraform output -raw control_plane_server_id 2>/dev/null || true)"
          CP_FIP="$(terraform output -raw control_plane_floating_ip 2>/dev/null || true)"
          if [ -z "${CP_SERVER_ID}" ]; then
            echo "::notice::No control_plane_server_id found in state; skipping CAPO delete pre-step."
            exit 0
          fi

          KCFG_B64=""
          for i in $(seq 1 80); do
            openstack console log show "${CP_SERVER_ID}" --lines 2000 > "$RUNNER_TEMP/control-plane-console.log" || true
            KCFG_B64="$(
              sed -n 's/.*K8S_ADMIN_KUBECONFIG_B64=\([A-Za-z0-9+/=]\+\).*/\1/p' "$RUNNER_TEMP/control-plane-console.log" \
                | tail -n1
            )"
            if [ -n "${KCFG_B64}" ]; then
              break
            fi
            echo "[$i/80] waiting for management kubeconfig payload in control-plane console log..."
            sleep 10
          done

          if [ -z "${KCFG_B64}" ]; then
            echo "::notice::Could not recover management kubeconfig from console logs; skipping CAPO delete pre-step."
            exit 0
          fi

          echo "${KCFG_B64}" | base64 -d > "$RUNNER_TEMP/mgmt-kubeconfig"
          if [ -n "${CP_FIP}" ]; then
            sed -E "s#server: https://.*:6443#server: https://${CP_FIP}:6443#" "$RUNNER_TEMP/mgmt-kubeconfig" > "$RUNNER_TEMP/mgmt-kubeconfig.public"
            mv "$RUNNER_TEMP/mgmt-kubeconfig.public" "$RUNNER_TEMP/mgmt-kubeconfig"
          fi
          mkdir -p "$HOME/.kube"
          cp "$RUNNER_TEMP/mgmt-kubeconfig" "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          bash "$GITHUB_WORKSPACE/scripts/destroy-capo-workload-cluster.sh"

      - name: Terraform destroy
        working-directory: terraform
        run: terraform destroy -auto-approve

      - name: Delete encrypted kubeconfig artifacts
        if: ${{ success() && inputs.destroy_confirmation == 'destroy-infra-confirm' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          IDS="$(gh api "repos/${REPO}/actions/artifacts" --paginate --jq '.artifacts[] | select(.name | startswith("kubeconfig-encrypted-")) | .id')"

          if [ -z "${IDS}" ]; then
            echo "::notice::No kubeconfig-encrypted artifacts found to delete."
            exit 0
          fi

          COUNT=0
          while IFS= read -r ID; do
            [ -z "${ID}" ] && continue
            gh api -X DELETE "repos/${REPO}/actions/artifacts/${ID}"
            COUNT=$((COUNT + 1))
          done <<< "${IDS}"

          echo "::notice::Deleted ${COUNT} kubeconfig-encrypted artifact(s)."

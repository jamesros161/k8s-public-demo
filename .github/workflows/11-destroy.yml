name: 11 - Destroy Full Cluster

on:
  workflow_dispatch:
    inputs:
      destroy_confirmation:
        description: |
          Irreversible: removes Terraform-managed OpenStack resources (networking, etc.).
          Default cancels. To proceed, change this to destroy-infra-confirm.
        required: true
        type: choice
        default: cancel
        options:
          - cancel
          - destroy-infra-confirm

permissions:
  contents: read
  actions: write

concurrency:
  group: openstack-terraform-provision
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CLOUD_ADMIN_CONFIG_B64: ${{ secrets.CLOUD_ADMIN_CONFIG_B64 }}

    steps:
      - name: Require explicit destroy confirmation
        run: |
          if [ "${{ inputs.destroy_confirmation }}" != "destroy-infra-confirm" ]; then
            echo "::notice::Destroy cancelled — confirmation left at default **cancel** (no cloud resources were changed)."
            exit 1
          fi
          echo "Destroy confirmation accepted; continuing."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Load cloud-admin config bundle
        run: bash scripts/load-cloud-admin-config.sh

      - name: Select OpenStack auth (app credential)
        run: bash scripts/configure-gha-openstack-auth.sh

      - name: Terraform state note
        run: |
          echo "::notice::Without remote state or a downloaded terraform.tfstate from the provision artifact, destroy may not remove cloud resources."

      - name: Setup kubectl and Helm (optional cleanup)
        uses: azure/setup-kubectl@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Load kubeconfig from encrypted artifact
        env:
          GH_TOKEN: ${{ github.token }}
          LOAD_KUBECONFIG_ARTIFACT_OPTIONAL: "true"
        run: bash scripts/load-kubeconfig-from-artifact.sh

      - name: Try remove Traefik (ignore errors)
        continue-on-error: true
        run: |
          helm uninstall traefik -n traefik || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write Terraform S3 backend config (Swift)
        run: bash scripts/write-terraform-s3-backend-ci.sh

      - name: Terraform destroy
        working-directory: terraform
        run: |
          terraform init -backend-config=backend.auto.hcl
          terraform destroy -auto-approve

      - name: Delete encrypted kubeconfig artifacts
        if: ${{ success() && inputs.destroy_confirmation == 'destroy-infra-confirm' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          IDS="$(gh api "repos/${REPO}/actions/artifacts" --paginate --jq '.artifacts[] | select(.name | startswith("kubeconfig-encrypted-")) | .id')"

          if [ -z "${IDS}" ]; then
            echo "::notice::No kubeconfig-encrypted artifacts found to delete."
            exit 0
          fi

          COUNT=0
          while IFS= read -r ID; do
            [ -z "${ID}" ] && continue
            gh api -X DELETE "repos/${REPO}/actions/artifacts/${ID}"
            COUNT=$((COUNT + 1))
          done <<< "${IDS}"

          echo "::notice::Deleted ${COUNT} kubeconfig-encrypted artifact(s)."
